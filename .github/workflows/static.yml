# ──────────────────────────────────────────────────────────────────────────────
# Implantação do Jekyll com dependências do GitHub Pages pré-instaladas
# Adaptado para aplicação React/Vite estática — 4 Pilares LGPD
#
# Referência oficial:
#   https://github.com/actions/starter-workflows/blob/main/pages/static.yml
# ──────────────────────────────────────────────────────────────────────────────

name: Implantar conteúdo estático no GitHub Pages

on:
  # Executa no push para a branch principal
  push:
    branches:
      - main

  # Permite executar manualmente pelo botão "Executar fluxo de trabalho"
  workflow_dispatch:

# Permissões mínimas necessárias para deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas uma implantação simultânea
# Cancela execuções em andamento se uma nova for iniciada
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Etapa 1: Build ──────────────────────────────────────────────────────────
  build:
    name: Build do frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm — versão lida automaticamente de packageManager no package.json
      - name: Configurar pnpm
        uses: pnpm/action-setup@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Configura o GitHub Pages e injeta a base URL corretamente
      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # Build somente do frontend (sem bundling do servidor)
      # GITHUB_PAGES=true ativa o base path /4pilares-lgpd/ no vite.config.ts
      - name: Build (Vite — modo GitHub Pages)
        run: pnpm exec vite build
        env:
          GITHUB_PAGES: "true"
          VITE_ANALYTICS_ENDPOINT: ""
          VITE_ANALYTICS_WEBSITE_ID: ""

      # Faz upload do diretório gerado como artefato de Pages
      - name: Fazer upload do artefato de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  # ── Etapa 2: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Implantação no GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Implantar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
